<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Father's Day Invitation</title>

<style>
body {
    background-color: lavender;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
}

input {
    padding: 10px;
    margin: 10px;
}

button {
    background-color: lightgreen;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    margin: 10px;
    border-radius: 5px;
}

#gif {
    display: none;
    width: 250px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>Father's Day Invitation</h1>

<label>Enter your name:</label>
<input type="text" id="name" placeholder="Your Name">

<button id="submitBtn">Submit</button>

<div id="invitation"></div>

<img
id="gif"
src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif"
alt="Celebration GIF"
>


<script>

let yesScale = 1;

document.getElementById("submitBtn").addEventListener("click", function () {

    const name = document.getElementById("name").value.trim();

    if (name === "") {
        alert("Please enter your name first!");
        return;
    }

    document.getElementById("invitation").innerHTML =
        "<p>Hi <b>" + name + "</b>! You are invited on June 21, 2026 for Father's Day.</p>" +
        "<p>Will you come?</p>" +
        '<button id="yesBtn">Yes</button>' +
        '<button id="noBtn">No</button>';
});

document.addEventListener("click", function(event) {

    if (event.target.id === "yesBtn") {

        document.getElementById("gif").style.display = "block";

        document.getElementById("invitation").innerHTML =
            "<h2>Yay! See you there 🎉</h2>";
    }

    if (event.target.id === "noBtn") {

        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");

        const x = Math.random() * 200 - 100;
        const y = Math.random() * 100 - 50;

        noBtn.style.transform =
            "translate(" + x + "px," + y + "px)";

        yesScale += 0.2;

        yesBtn.style.transform =
            "scale(" + yesScale + ")";
    }
});

</script>

</body>
</html>
