<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Father's Day Invitation</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom right,#f8d7ff,#d6f5ff);
    overflow-x:hidden;
    text-align:center;
}

/* FIRST SCREEN */

#formPage{
    margin-top:120px;
}

h1{
    font-size:48px;
    color:#333;
}

input{
    padding:12px;
    width:220px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

#submitBtn{
    background:#7bed9f;
}

#submitBtn:hover{
    transform:scale(1.05);
}

/* INVITATION PAGE */

#invitationPage{
    display:none;
    padding-top:70px;
}

#yesBtn{
    background:#2ed573;
    color:white;
    margin:10px;
}

#noBtn{
    background:#ff6b81;
    color:white;
    margin:10px;
    position:relative;
}

#yesBtn:hover,
#noBtn:hover{
    transform:scale(1.05);
}

/* SUCCESS PAGE */

#successPage{
    display:none;
    padding-top:40px;
}

#familyPic{
    width:300px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

#gif{
    width:220px;
    margin-top:20px;
}

/* CRYING STICKERS */

.crySticker{
    position:absolute;
    width:70px;
    animation:float 3s linear forwards;
}

@keyframes float{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-200px);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- FIRST PAGE -->

<div id="formPage">

    <h1>Father's Day Invitation 💙</h1>

    <p>Enter your name first!</p>

    <input type="text" id="name" placeholder="Your Name">

    <button id="submitBtn">Submit</button>

</div>

<!-- SECOND PAGE -->

<div id="invitationPage">

    <h1 id="welcomeText"></h1>

    <p>
        You are invited on June 21, 2026 at VillaTuna at exactly 8:00P.M.<br>
        to celebrate Father's Day with us 💖 <br>
        P.S. libre kuno ni nanay hehe
    </p>

    <h3>Will you come?</h3>

    <button id="yesBtn">Yes 💚</button>
    <button id="noBtn">No 💔</button>

</div>

<!-- SUCCESS PAGE -->

<div id="successPage">

    <h1>Yay! See you there 🎉</h1>

    <img
    id="gif"
    src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif"
    >

    <br>

    <!-- REPLACE THIS WITH YOUR FAMILY PICTURE -->
    <img
    id="familyPic"
    src="family.jpg"
    alt="Family Picture"
    >

</div>

<!-- MUSIC -->
<audio id="music">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let yesScale = 1;

/* SUBMIT BUTTON */

document.getElementById("submitBtn").addEventListener("click",function(){

    const name =
    document.getElementById("name").value.trim();

    if(name===""){
        alert("Please enter your name first!");
        return;
    }

    // hide first page
    document.getElementById("formPage").style.display="none";

    // show invitation page
    document.getElementById("invitationPage").style.display="block";

    // personalized text
    document.getElementById("welcomeText").innerHTML=
    "Hi "+name+" 💖";

});

/* YES BUTTON */

document.getElementById("yesBtn").addEventListener("click",function(){

    document.getElementById("invitationPage").style.display="none";

    document.getElementById("successPage").style.display="block";

    // PLAY MUSIC
    document.getElementById("music").play();

});

/* NO BUTTON */

document.getElementById("noBtn").addEventListener("click",function(){

    const noBtn =
    document.getElementById("noBtn");

    const yesBtn =
    document.getElementById("yesBtn");

    // move no button randomly
    const x = Math.random()*300-150;
    const y = Math.random()*100-50;

    noBtn.style.transform =
    "translate("+x+"px,"+y+"px)";

    // enlarge yes button
    yesScale += 0.15;

    yesBtn.style.transform =
    "scale("+yesScale+")";

    // crying stickers
    createCrySticker();

});

/* CREATE CRYING STICKERS */

function createCrySticker(){

    const sticker =
    document.createElement("img");

    sticker.src =
    "https://cdn-icons-png.flaticon.com/512/742/742752.png";

    sticker.classList.add("crySticker");

    sticker.style.left =
    Math.random()*window.innerWidth+"px";

    sticker.style.top =
    Math.random()*window.innerHeight+"px";

    document.body.appendChild(sticker);

    setTimeout(()=>{
        sticker.remove();
    },3000);
}

</script>

</body>
</html>
